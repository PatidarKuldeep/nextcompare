{% extends "base.html" %}

{% block title %}Popular Phone Comparisons{% endblock %}

{% block content %}

<h1 class="mb-4">Popular Comparisons</h1>

<div class="row">

{% for c in comparisons %}

<div class="col-md-4 mb-3">

<div class="card p-3 text-center shadow-sm">

<a href="/compare/{{ c.p1.slug }}-vs-{{ c.p2.slug }}/"
class="text-decoration-none">

<strong>{{ c.p1.name }}</strong>

<br>

<span class="text-muted">vs</span>

<br>

<strong>{{ c.p2.name }}</strong>

</a>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
